version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: warehouse_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - warehouse_net
    # NOT exposed to host — only accessible inside Docker network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: warehouse_backend
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      PORT: 3002
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN}
    depends_on:
      - postgres
    networks:
      - warehouse_net
    ports:
      - '3001:3001'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: warehouse_frontend
    restart: unless-stopped
    networks:
      - warehouse_net
    ports:
      - '3000:80'
    depends_on:
      - backend

networks:
  warehouse_net:
    driver: bridge

volumes:
  postgres_data: